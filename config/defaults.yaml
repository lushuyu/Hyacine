# config/defaults.yaml
# Generic defaults — copy to ~/.config/hyacine/config.yaml and tune.
# Or run `python -m hyacine init` to generate automatically.

# REQUIRED — your delivery address (the wizard will set this for you)
recipient_email: ""

# IANA timezone identifier, e.g. "America/New_York", "Europe/London", "Asia/Tokyo"
# Full list: https://en.wikipedia.org/wiki/List_of_tz_database_time_zones
timezone: UTC

# Output language for the briefing email: "en" (English) or "zh-CN" (Simplified Chinese)
language: en

# LLM model passed to `claude -p --model`. "sonnet" = claude-sonnet-4-6.
llm_model: sonnet

# Time of day to send the briefing (HH:MM in the configured timezone).
# The systemd timer uses this value — re-run `python -m hyacine init` after changing.
run_time: "07:30"

# Subprocess timeout for `claude -p` (seconds). Increase for very large mailboxes.
llm_timeout_seconds: 300

# Soft cap on emails pulled per window. The window is watermark-based so even
# a backlog stays bounded by this value; raise if you see truncation warnings.
fetch_max_emails: 500

# First-run watermark: if the DB has no last_successful_run_at, pretend the last
# success was N hours ago so we don't attempt to fetch the entire mailbox.
initial_watermark_lookback_hours: 24
