<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>{% block title %}Briefing{% endblock %}</title>
<script src="https://unpkg.com/htmx.org@2.0.3"></script>
<style>
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",system-ui,sans-serif;max-width:900px;margin:2em auto;padding:0 1em;color:#222;line-height:1.55}
nav a{margin-right:1em;color:#0a58ca;text-decoration:none}
nav a:hover{text-decoration:underline}
h1{border-bottom:1px solid #ddd;padding-bottom:.3em}
table{border-collapse:collapse;width:100%}
th,td{text-align:left;padding:.4em .8em;border-bottom:1px solid #eee}
textarea{width:100%;font-family:"SF Mono",Menlo,Consolas,monospace;font-size:.9em}
button{padding:.5em 1em;cursor:pointer}
.status-success{color:#198754}.status-failed{color:#dc3545}.status-running{color:#fd7e14}
</style>
</head>
<body>
<nav>
<a href="/">Dashboard</a>
<a href="/prompt">Prompt</a>
<a href="/rules">Rules</a>
</nav>
<hr>
{% block content %}{% endblock %}
</body>
</html>
