name: Desktop build

on:
  push:
    branches: [main]
    paths:
      - 'desktop/**'
      - 'src/hyacine/ipc/**'
      - '.github/workflows/desktop.yml'
  pull_request:
    paths:
      - 'desktop/**'
      - 'src/hyacine/ipc/**'
      - '.github/workflows/desktop.yml'
  workflow_dispatch:

jobs:
  check:
    name: Frontend check (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        working-directory: desktop
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: desktop/package-lock.json
      - name: Install frontend
        run: npm ci --no-audit --no-fund
      - name: Type-check
        run: npm run check

  compile:
    # We only verify that the Tauri shell *compiles* on every matrix OS.
    # Producing installer bundles (.dmg/.msi/.AppImage) requires signing
    # material that CI doesn't carry, so we leave that to the release
    # workflow. This job catches Rust compile regressions on every PR.
    name: Rust compile (${{ matrix.os }})
    needs: check
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            rust-target: aarch64-apple-darwin
          - os: windows-latest
            rust-target: x86_64-pc-windows-msvc
          - os: ubuntu-22.04
            rust-target: x86_64-unknown-linux-gnu
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        working-directory: desktop
    steps:
      - uses: actions/checkout@v5

      - name: Install Linux deps
        if: matrix.os == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          # Full tauri v2 build-time deps — gdk-3.0 comes from libgtk-3-dev,
          # the ayatana appindicator fork replaced the unmaintained original,
          # libxdo is required by tauri-plugin-global-shortcut & friends.
          sudo apt-get install -y \
            build-essential \
            curl \
            file \
            wget \
            libayatana-appindicator3-dev \
            libgtk-3-dev \
            librsvg2-dev \
            libssl-dev \
            libwebkit2gtk-4.1-dev \
            libxdo-dev \
            patchelf

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust-target }}

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: desktop/src-tauri

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: desktop/package-lock.json

      - name: Install frontend
        run: npm ci --no-audit --no-fund

      # tauri::generate_context! inspects the frontend dist — build once.
      - name: Build frontend
        run: npm run build

      - name: Generate icons
        run: npx --yes @tauri-apps/cli icon static/favicon.svg

      - name: Cargo check
        working-directory: desktop/src-tauri
        run: cargo check --locked --target ${{ matrix.rust-target }}
