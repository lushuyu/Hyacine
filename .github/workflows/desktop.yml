name: Desktop

on:
  push:
    branches: [main]
    paths:
      - 'desktop/**'
      - 'src/hyacine/ipc/**'
      - '.github/workflows/desktop.yml'
  pull_request:
    paths:
      - 'desktop/**'
      - 'src/hyacine/ipc/**'
      - '.github/workflows/desktop.yml'
  workflow_dispatch:

# Cancel in-flight runs of the same workflow+ref when a new push lands;
# dramatically cuts redundant CI (and email) while reviewers iterate.
concurrency:
  group: desktop-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    # One job per OS that does type-check → cargo check → full Tauri bundle →
    # upload. Condensed from three separate jobs so each push produces 3
    # check rows + 1 workflow email instead of ~9 rows.
    name: Build (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            rust-target: aarch64-apple-darwin
            artifact-glob: |
              desktop/src-tauri/target/*/release/bundle/dmg/*.dmg
              desktop/src-tauri/target/*/release/bundle/macos/*.app.tar.gz
          - os: windows-latest
            rust-target: x86_64-pc-windows-msvc
            artifact-glob: |
              desktop/src-tauri/target/*/release/bundle/msi/*.msi
              desktop/src-tauri/target/*/release/bundle/nsis/*.exe
          - os: ubuntu-22.04
            rust-target: x86_64-unknown-linux-gnu
            artifact-glob: |
              desktop/src-tauri/target/*/release/bundle/appimage/*.AppImage
              desktop/src-tauri/target/*/release/bundle/deb/*.deb
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        working-directory: desktop

    steps:
      - uses: actions/checkout@v5

      - name: Install Linux deps
        if: matrix.os == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            curl \
            file \
            wget \
            libayatana-appindicator3-dev \
            libgtk-3-dev \
            librsvg2-dev \
            libssl-dev \
            libwebkit2gtk-4.1-dev \
            libxdo-dev \
            patchelf

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust-target }}

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: desktop/src-tauri
          key: ${{ matrix.rust-target }}

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: desktop/package-lock.json

      - name: Install frontend
        run: npm ci --no-audit --no-fund

      - name: Type-check
        run: npm run check

      - name: Generate icons
        run: npx --yes @tauri-apps/cli icon static/favicon.svg

      # Stamp a per-run version so each CI bundle has a unique identifier.
      # We deliberately keep the version as X.Y.Z (no semver pre-release
      # suffix, no '+build' metadata) because Windows MSI bundlers require
      # exactly three numeric components ≤ 65535. On tag pushes matching
      # vX.Y.Z we use the tag's version verbatim.
      - name: Stamp build version
        shell: bash
        run: |
          set -euo pipefail
          if [[ "${GITHUB_REF:-}" == refs/tags/v* ]]; then
            VERSION="${GITHUB_REF#refs/tags/v}"
          else
            # 0.<major>.<run>: minor tracks the manifest's current major,
            # patch tracks the monotonic CI run number.
            MAJOR=$(jq -r .version src-tauri/tauri.conf.json | cut -d. -f2)
            VERSION="0.${MAJOR}.${GITHUB_RUN_NUMBER:-0}"
          fi
          echo "Stamping version: $VERSION"

          tmp=$(mktemp)
          jq --arg v "$VERSION" '.version = $v' src-tauri/tauri.conf.json > "$tmp"
          mv "$tmp" src-tauri/tauri.conf.json

          tmp=$(mktemp)
          jq --arg v "$VERSION" '.version = $v' package.json > "$tmp"
          mv "$tmp" package.json

          # Only the first `version = "…"` in Cargo.toml is the [package] one.
          sed -i.bak -E "0,/^version = \"[^\"]+\"/s//version = \"${VERSION}\"/" src-tauri/Cargo.toml
          rm -f src-tauri/Cargo.toml.bak

          echo "BUNDLE_VERSION=$VERSION" >> "$GITHUB_ENV"

      - name: Bundle (Tauri)
        # tauri build runs `npm run build` internally via beforeBuildCommand,
        # so we don't call it separately. signingIdentity is set to null in
        # tauri.conf.json so the bundler produces unsigned artifacts instead
        # of aborting on missing keychain entries; the CI still needs
        # CI=true for tauri-cli v2 non-interactive mode.
        run: npm run tauri:build -- --target ${{ matrix.rust-target }}
        env:
          CI: 'true'

      - name: Upload installer
        uses: actions/upload-artifact@v4
        with:
          name: hyacine-${{ env.BUNDLE_VERSION }}-${{ matrix.rust-target }}
          path: ${{ matrix.artifact-glob }}
          if-no-files-found: error
          retention-days: 14
