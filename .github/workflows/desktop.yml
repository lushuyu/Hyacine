name: Desktop

on:
  push:
    branches: [main]
    paths:
      - 'desktop/**'
      - 'src/hyacine/ipc/**'
      - '.github/workflows/desktop.yml'
  pull_request:
    paths:
      - 'desktop/**'
      - 'src/hyacine/ipc/**'
      - '.github/workflows/desktop.yml'
  workflow_dispatch:

# Cancel in-flight runs of the same workflow+ref when a new push lands;
# dramatically cuts redundant CI (and email) while reviewers iterate.
concurrency:
  group: desktop-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    # One job per OS that does type-check → cargo check → full Tauri bundle →
    # upload. Condensed from three separate jobs so each push produces 3
    # check rows + 1 workflow email instead of ~9 rows.
    name: Build (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            rust-target: aarch64-apple-darwin
            artifact-glob: |
              desktop/src-tauri/target/*/release/bundle/dmg/*.dmg
              desktop/src-tauri/target/*/release/bundle/macos/*.app.tar.gz
          - os: windows-latest
            rust-target: x86_64-pc-windows-msvc
            artifact-glob: |
              desktop/src-tauri/target/*/release/bundle/msi/*.msi
              desktop/src-tauri/target/*/release/bundle/nsis/*.exe
          - os: ubuntu-22.04
            rust-target: x86_64-unknown-linux-gnu
            artifact-glob: |
              desktop/src-tauri/target/*/release/bundle/appimage/*.AppImage
              desktop/src-tauri/target/*/release/bundle/deb/*.deb
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        working-directory: desktop

    steps:
      - uses: actions/checkout@v5

      - name: Install Linux deps
        if: matrix.os == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            curl \
            file \
            wget \
            libayatana-appindicator3-dev \
            libgtk-3-dev \
            librsvg2-dev \
            libssl-dev \
            libwebkit2gtk-4.1-dev \
            libxdo-dev \
            patchelf

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust-target }}

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: desktop/src-tauri
          key: ${{ matrix.rust-target }}

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: desktop/package-lock.json

      - name: Install frontend
        run: npm ci --no-audit --no-fund

      - name: Type-check
        run: npm run check

      - name: Generate icons
        run: npx --yes @tauri-apps/cli icon static/favicon.svg

      - name: Bundle (Tauri)
        # tauri build runs `npm run build` internally via beforeBuildCommand,
        # so we don't call it separately. `--ci` disables interactive prompts.
        # Signing env vars are explicitly emptied so the bundler produces
        # unsigned artifacts instead of aborting on missing keychain entries.
        run: npm run tauri:build -- --target ${{ matrix.rust-target }} --ci
        env:
          TAURI_SIGNING_PRIVATE_KEY: ''
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ''
          APPLE_CERTIFICATE: ''
          APPLE_CERTIFICATE_PASSWORD: ''
          APPLE_SIGNING_IDENTITY: '-'

      - name: Upload installer
        uses: actions/upload-artifact@v4
        with:
          name: hyacine-${{ matrix.rust-target }}
          path: ${{ matrix.artifact-glob }}
          if-no-files-found: error
          retention-days: 14
