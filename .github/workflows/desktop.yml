name: Desktop build

on:
  push:
    branches: [main]
    paths:
      - 'desktop/**'
      - 'src/hyacine/ipc/**'
      - '.github/workflows/desktop.yml'
  pull_request:
    paths:
      - 'desktop/**'
      - 'src/hyacine/ipc/**'
      - '.github/workflows/desktop.yml'
  workflow_dispatch:

jobs:
  check:
    name: Frontend check (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        working-directory: desktop
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: desktop/package-lock.json
      - name: Install frontend
        run: npm ci --no-audit --no-fund
      - name: Type-check
        run: npm run check

  build:
    name: Tauri build (${{ matrix.os }})
    needs: check
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            rust-target: aarch64-apple-darwin
          - os: windows-latest
            rust-target: x86_64-pc-windows-msvc
          - os: ubuntu-22.04
            rust-target: x86_64-unknown-linux-gnu
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        working-directory: desktop
    steps:
      - uses: actions/checkout@v5

      - name: Install Linux deps
        if: matrix.os == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev \
            patchelf libssl-dev

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust-target }}

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: desktop/src-tauri

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: desktop/package-lock.json

      - name: Install frontend
        run: npm ci --no-audit --no-fund

      - name: Generate icons (dummy)
        run: npx --yes @tauri-apps/cli icon static/favicon.svg || true

      - name: Build
        run: npm run tauri:build -- --target ${{ matrix.rust-target }}
        env:
          # Builds without code-signing on CI for now; release jobs set these.
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: hyacine-desktop-${{ matrix.os }}
          path: |
            desktop/src-tauri/target/*/release/bundle/**
          if-no-files-found: warn
