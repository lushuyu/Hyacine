name: CI

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
  workflow_dispatch:

# Whole workflow cancels on push so interactive reviewers only ever wait
# on the latest commit. One workflow + one concurrency scope means three
# separate YAMLs (scrub / ci / desktop) collapse into a single run with
# a single Actions email per push.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ──────────────────────────────────────────────────────────────────────
  # Python lint + type + test + secret-scrub.
  # Folds the old `scrub.yml` (standalone scrub_check) into one job.
  # ──────────────────────────────────────────────────────────────────────
  python:
    name: Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v5

      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Set Python version
        run: uv python install ${{ matrix.python-version }}

      - name: Sync
        run: uv sync --python ${{ matrix.python-version }}

      - name: Ruff
        run: uv run ruff check .

      - name: Mypy
        run: uv run mypy src/

      - name: Pytest
        run: uv run pytest -q

      - name: Scrub check
        run: uv run python scripts/scrub_check.py

  # ──────────────────────────────────────────────────────────────────────
  # Desktop: per-platform PyInstaller sidecar + Tauri bundle + artifact.
  # Runs in parallel with the Python job — desktop failures shouldn't
  # depend on Python lint turnaround.
  # ──────────────────────────────────────────────────────────────────────
  desktop:
    name: Desktop (${{ matrix.target }})
    strategy:
      # Let the full matrix finish even when one runner hits something
      # platform-specific — reviewers want to see all failures at once.
      fail-fast: false
      matrix:
        include:
          # Apple Silicon
          - os: macos-latest
            target: aarch64-apple-darwin
            artifact-glob: |
              desktop/src-tauri/target/*/release/bundle/dmg/*.dmg
              desktop/src-tauri/target/*/release/bundle/macos/*.app.tar.gz
          # Intel Mac (macos-13) deliberately dropped: the runner pool is
          # saturated enough that jobs sit queued for 30–60 min on every
          # push, and x86_64 Mac users can run the Apple Silicon bundle via
          # Rosetta if needed.
          # x86_64 Windows
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact-glob: |
              desktop/src-tauri/target/*/release/bundle/msi/*.msi
              desktop/src-tauri/target/*/release/bundle/nsis/*.exe
          # Windows on ARM — native ARM runner avoids x86 cross-compile.
          - os: windows-11-arm
            target: aarch64-pc-windows-msvc
            artifact-glob: |
              desktop/src-tauri/target/*/release/bundle/msi/*.msi
              desktop/src-tauri/target/*/release/bundle/nsis/*.exe
          # x86_64 Linux — 22.04 (not latest) to pin the AppImage's glibc
          # floor at 2.35; users on older distros get a working binary.
          - os: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            artifact-glob: |
              desktop/src-tauri/target/*/release/bundle/appimage/*.AppImage
              desktop/src-tauri/target/*/release/bundle/deb/*.deb
          # ARM64 Linux — 24.04-arm is the only arm64 Ubuntu runner GH offers.
          - os: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
            artifact-glob: |
              desktop/src-tauri/target/*/release/bundle/appimage/*.AppImage
              desktop/src-tauri/target/*/release/bundle/deb/*.deb
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v5

      - name: Install Linux deps
        if: startsWith(matrix.os, 'ubuntu-')
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            curl \
            file \
            wget \
            libayatana-appindicator3-dev \
            libgtk-3-dev \
            librsvg2-dev \
            libssl-dev \
            libwebkit2gtk-4.1-dev \
            libxdo-dev \
            patchelf \
            xdg-utils
          # xdg-utils ships `xdg-open`, which tauri-bundler embeds into the
          # AppImage/deb at bundle time. ubuntu-22.04 has it preinstalled;
          # ubuntu-24.04-arm doesn't, so the bundler fails with "xdg-open
          # binary not found (os error 2)". Install unconditionally.

      # ── Rust toolchain ────────────────────────────────────────────────
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: desktop/src-tauri
          key: ${{ matrix.target }}

      # ── Node + uv (for PyInstaller sidecar build) ─────────────────────
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: desktop/package-lock.json

      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      # ── Frontend install + type-check ─────────────────────────────────
      - name: Install frontend
        working-directory: desktop
        run: npm ci --no-audit --no-fund

      - name: Type-check
        working-directory: desktop
        run: npm run check

      # ── Build the PyInstaller sidecar ─────────────────────────────────
      # uv installs hyacine + deps into an isolated venv, then we run
      # PyInstaller against it. The resulting binary lands in
      # `desktop/src-tauri/binaries/` with a target-triple suffix so Tauri's
      # `externalBin` resolution matches the right file on each host.

      # cryptography 46.x publishes no win_arm64 binary wheel yet, so uv
      # falls through to a source build. That pulls in openssl-sys, which
      # needs system OpenSSL. Install it via the vcpkg preinstalled on GH
      # runners and point the Rust build at it. Scoped to this runner only
      # — the other platforms all hit a prebuilt wheel.
      - name: Install OpenSSL (Windows on ARM)
        if: matrix.os == 'windows-11-arm'
        shell: pwsh
        run: |
          vcpkg install --triplet arm64-windows-static openssl
          $openssl_root = "$env:VCPKG_INSTALLATION_ROOT\installed\arm64-windows-static"
          echo "OPENSSL_DIR=$openssl_root" >> $env:GITHUB_ENV
          echo "OPENSSL_STATIC=1" >> $env:GITHUB_ENV
          echo "OPENSSL_NO_VENDOR=1" >> $env:GITHUB_ENV

      - name: Sync Python deps for sidecar
        run: uv sync --python 3.12

      - name: Install PyInstaller
        run: uv pip install pyinstaller

      - name: Build bundled sidecar
        shell: bash
        working-directory: desktop/sidecar
        run: |
          set -euo pipefail
          mkdir -p ../src-tauri/binaries
          uv run pyinstaller hyacine-ipc.spec \
            --distpath ../src-tauri/binaries \
            --workpath ../../.pyi-work \
            --clean -y

      - name: Rename sidecar to target triple
        shell: bash
        working-directory: desktop/src-tauri/binaries
        run: |
          set -euo pipefail
          if [[ "${{ matrix.os }}" == windows-* ]]; then
            mv hyacine-ipc.exe "hyacine-ipc-${{ matrix.target }}.exe"
          else
            mv hyacine-ipc "hyacine-ipc-${{ matrix.target }}"
            chmod +x "hyacine-ipc-${{ matrix.target }}"
          fi
          ls -la

      # ── Smoke-test the bundled sidecar before handing to Tauri ────────
      # Pipe one system.ping request; expect a result object back. Catches
      # missing hidden imports (keyring backends, dynamically-loaded
      # handler modules, pydantic plumbing) before they land in an
      # installer.
      - name: Smoke-test sidecar
        shell: bash
        working-directory: desktop/src-tauri/binaries
        run: |
          set -euo pipefail
          BIN="./hyacine-ipc-${{ matrix.target }}"
          if [[ "${{ matrix.os }}" == windows-* ]]; then
            BIN="${BIN}.exe"
          fi
          echo '{"jsonrpc":"2.0","id":1,"method":"system.ping","params":{}}' \
            | "$BIN" \
            | head -c 2048
          echo

      # ── Icons (Tauri generates them from the source SVG) ──────────────
      - name: Generate icons
        working-directory: desktop
        run: npx --yes @tauri-apps/cli icon static/favicon.svg

      # ── Stamp a per-run version so each CI bundle is distinguishable.
      # On tag pushes matching vX.Y.Z we use the tag verbatim; otherwise
      # we derive <major>.<minor>.<run_number>. Three-component numeric
      # keeps Windows MSI bundlers happy.
      - name: Stamp build version
        shell: bash
        working-directory: desktop
        run: |
          set -euo pipefail
          if [[ "${GITHUB_REF:-}" == refs/tags/v* ]]; then
            VERSION="${GITHUB_REF#refs/tags/v}"
          else
            MAJOR=$(jq -r .version src-tauri/tauri.conf.json | cut -d. -f1)
            MINOR=$(jq -r .version src-tauri/tauri.conf.json | cut -d. -f2)
            VERSION="${MAJOR}.${MINOR}.${GITHUB_RUN_NUMBER:-0}"
          fi
          echo "Stamping version: $VERSION"

          tmp=$(mktemp)
          jq --arg v "$VERSION" '.version = $v' src-tauri/tauri.conf.json > "$tmp"
          mv "$tmp" src-tauri/tauri.conf.json

          tmp=$(mktemp)
          jq --arg v "$VERSION" '.version = $v' package.json > "$tmp"
          mv "$tmp" package.json

          # First `version = "…"` in Cargo.toml is the [package] one.
          # sed -i syntax differs between GNU (linux) and BSD (mac); the
          # -E + .bak form is portable across both.
          sed -i.bak -E "0,/^version = \"[^\"]+\"/s//version = \"${VERSION}\"/" src-tauri/Cargo.toml
          rm -f src-tauri/Cargo.toml.bak

          echo "BUNDLE_VERSION=$VERSION" >> "$GITHUB_ENV"

      # ── Tauri bundle ──────────────────────────────────────────────────
      # Tauri's externalBin looks for `binaries/hyacine-ipc-<target>[.exe]`
      # — we produced that file two steps above, so the bundler embeds it
      # into the installer automatically.
      - name: Bundle (Tauri)
        working-directory: desktop
        run: npm run tauri:build -- --target ${{ matrix.target }}
        env:
          CI: 'true'

      - name: Upload installer
        uses: actions/upload-artifact@v4
        with:
          name: hyacine-${{ env.BUNDLE_VERSION }}-${{ matrix.target }}
          path: ${{ matrix.artifact-glob }}
          if-no-files-found: error
          retention-days: 14

  # ──────────────────────────────────────────────────────────────────────
  # Pre-release publish. Takes whatever installers the desktop matrix
  # managed to produce and ships them as a GitHub Release marked
  # `prerelease: true`.
  #
  # Partial matrix is OK. `always()` + `python.result == 'success'` lets
  # us publish when e.g. one platform's tauri-bundler has a transient
  # flake (the macOS bundle_dmg.sh is historically prone to this) — users
  # on the four green platforms get their installers now, and the flaky
  # one can be rerun at leisure. If ZERO cells succeed we bail loudly so
  # the job doesn't quietly publish an empty release.
  #
  # Tag selection:
  # - refs/tags/v*        → use the tag verbatim; this is how a real
  #                          release cut happens (`git tag v1.2.3 && git push`).
  # - refs/heads/main     → rolling `nightly` release; each main push
  #                          replaces the prior one so users always grab
  #                          "latest built from main".
  # - any other ref       → skip (PRs, feature branches).
  #
  # The release is always prerelease=true so the latest-tag promotion on
  # GitHub's UI is a deliberate, human action — never an accident of a
  # nightly push.
  # ──────────────────────────────────────────────────────────────────────
  prerelease:
    name: Publish pre-release
    needs: [python, desktop]
    # `always()` bypasses the default "skip if any needed job failed"
    # behaviour so a single flaky matrix cell doesn't block the nightly
    # entirely. We still require Python tests to be green (non-negotiable)
    # and gate on the push ref so PRs never publish.
    if: >-
      always()
      && needs.python.result == 'success'
      && github.event_name == 'push'
      && (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v'))
    runs-on: ubuntu-latest
    permissions:
      # softprops/action-gh-release needs write to the Contents API for
      # release + tag creation. No other scopes required.
      contents: write
    steps:
      - uses: actions/checkout@v5
        with:
          # Full history so release notes could cite prior tags later
          # (not used today, but the extra 2s is worth the option).
          fetch-depth: 0

      - name: Download installer artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          # Flatten every matrix artifact into one directory — each one
          # already includes the target triple in its filename, so there
          # are no collisions. Release assets don't support nested dirs.
          merge-multiple: true
          pattern: hyacine-*

      - name: List downloaded artifacts
        run: ls -la dist/ && find dist -type f | head -40

      - name: Abort if no installers were produced
        shell: bash
        run: |
          set -euo pipefail
          if [[ -z "$(find dist -mindepth 1 -type f 2>/dev/null | head -1)" ]]; then
            echo "::error::No installer artifacts present — every desktop matrix cell failed. Aborting release."
            exit 1
          fi
          echo "Found $(find dist -type f | wc -l) installer file(s) to publish."

      - name: Compute release metadata
        id: meta
        # Mirrors the "Stamp build version" step in the desktop job so the
        # release tag matches the version embedded inside the installer.
        #
        # - refs/tags/v*   → use the tag verbatim, e.g. `v1.2.3`.
        # - refs/heads/main → derive `major.minor.<run_number>` from
        #                     tauri.conf.json + GITHUB_RUN_NUMBER, then tag
        #                     `nightly-<version>`. GITHUB_RUN_NUMBER climbs
        #                     with every workflow run so each nightly gets a
        #                     unique tag — no need to delete the prior tag,
        #                     no race against the upload step.
        shell: bash
        run: |
          set -euo pipefail
          short_sha="${GITHUB_SHA:0:7}"
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            version="${GITHUB_REF#refs/tags/v}"
            tag="v${version}"
            title="Hyacine ${tag}"
          else
            major=$(jq -r .version desktop/src-tauri/tauri.conf.json | cut -d. -f1)
            minor=$(jq -r .version desktop/src-tauri/tauri.conf.json | cut -d. -f2)
            version="${major}.${minor}.${GITHUB_RUN_NUMBER:-0}"
            tag="nightly-${version}"
            title="Nightly ${version} (main @ ${short_sha})"
          fi
          {
            echo "tag=${tag}"
            echo "title=${title}"
            echo "version=${version}"
            echo "short_sha=${short_sha}"
          } >> "$GITHUB_OUTPUT"

      - name: Publish pre-release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.meta.outputs.tag }}
          name: ${{ steps.meta.outputs.title }}
          prerelease: true
          # Never mark a pre-release as "Latest" on the repo homepage —
          # that bit should only flip when a human promotes a real tag.
          make_latest: false
          target_commitish: ${{ github.sha }}
          files: dist/**
          fail_on_unmatched_files: true
          body: |
            Automated pre-release from CI.

            - Version: `${{ steps.meta.outputs.version }}`
            - Commit: `${{ github.sha }}`
            - Run: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
            - Branch / tag: `${{ github.ref }}`

            Installers are **unsigned** — see the desktop README for the one-time
            SmartScreen / Gatekeeper bypass instructions.
