name: CI
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-type-test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
      - name: Set Python version
        run: uv python install ${{ matrix.python-version }}
      - name: Sync
        run: uv sync --python ${{ matrix.python-version }}
      - name: Ruff
        run: uv run ruff check .
      - name: Mypy
        run: uv run mypy src/
      - name: Pytest
        run: uv run pytest -q
      - name: Scrub check
        run: uv run python scripts/scrub_check.py
