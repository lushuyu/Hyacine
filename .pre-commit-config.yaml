repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.6.9
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format
  - repo: local
    hooks:
      - id: scrub-check
        name: scrub-check
        entry: python scripts/scrub_check.py
        language: system
        pass_filenames: false
